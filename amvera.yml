# Конфигурация для Amvera Cloud
meta:
  environment: node
  toolchain:
    name: npm
    version: 22
build:
  additionalCommands: "npx prisma generate && npm run build"
run:
  command: "PORT=3000 HOST=0.0.0.0 NODE_OPTIONS='--max-old-space-size=400' node .next/standalone/server.js"
  containerPort: 3000
