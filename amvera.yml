# Build ID: 2026032606
meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: "rm -rf node_modules .next && npm install && npx prisma generate && npm run build && cp -r public .next/standalone/ && mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/ && pip3 install -r scripts/news-scraper/requirements.txt -q 2>/dev/null || true"

run:
  command: "python3 scripts/news-scraper/main.py >> /tmp/scraper.log 2>&1 & HOSTNAME=0.0.0.0 PORT=3000 NODE_OPTIONS='--max-old-space-size=512' node .next/standalone/server.js"
  containerPort: 3000
