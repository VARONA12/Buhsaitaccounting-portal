meta:
  environment: node
  toolchain:
    name: npm
    version: 22

build:
  additionalCommands: "npx prisma generate && npm run build && cp -r public .next/standalone/ && mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/"

run:
  command: "HOSTNAME=0.0.0.0 PORT=3000 NODE_OPTIONS='--max-old-space-size=448' node .next/standalone/server.js"
  containerPort: 3000
