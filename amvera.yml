meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: "rm -rf node_modules .next && npm install && npx prisma db push --accept-data-loss && npm run build && cp -r public .next/standalone/ && mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/"

run:
  command: "HOSTNAME=0.0.0.0 PORT=3000 NODE_OPTIONS='--max-old-space-size=512' node .next/standalone/server.js"
  containerPort: 3000
