# Конфигурация для Amvera Cloud
meta:
  environment: node
  toolchain:
    name: npm
    version: 22
build:
  additionalCommands: "npm run build"
  artifacts:
    - .next
    - public
    - package.json
    - node_modules
    - prisma
run:
  command: npm run start
  persistence:
    - path: /data
      shared: true
