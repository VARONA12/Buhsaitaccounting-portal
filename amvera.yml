# Конфигурация для Amvera Cloud
meta:
  environment: node
  toolchain:
    name: npm
    version: 22
build:
  additionalCommands: "npx prisma generate && npm run build"
run:
  command: "node --max-old-space-size=400 .next/standalone/server.js"
  containerPort: 3000
  env:
    NODE_OPTIONS: "--max-old-space-size=400"
